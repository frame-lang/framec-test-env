services:
  python-runner:
    build:
      context: ./python
    volumes:
      - ../tests:/tests:ro
    container_name: frame-python-runner

  typescript-runner:
    build:
      context: ./typescript
    volumes:
      - ../tests:/tests:ro
    container_name: frame-typescript-runner

  rust-runner:
    build:
      context: ./rust
    volumes:
      - ../tests:/tests:ro
    container_name: frame-rust-runner
