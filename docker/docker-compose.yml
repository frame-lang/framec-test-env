# Frame Test Environment — All 17 Language Backends
#
# Usage:
#   FRAMEC_BIN=/path/to/framec docker compose up        # Run all
#   FRAMEC_BIN=/path/to/framec docker compose up python  # Single language
#   FRAMEC_BIN=/path/to/framec docker compose build      # Build images only
#
# The framec binary is mounted at runtime — never baked into images.
# Images only need rebuilding when the language toolchain changes.

x-framec-volume: &framec
  ${FRAMEC_BIN:?Set FRAMEC_BIN to the path of a Linux framec binary}:/usr/local/bin/framec:ro
x-tests-volume: &tests
  ../tests:/tests:ro
x-env: &env
  COMPILE_ONLY: ${COMPILE_ONLY:-false}
  # Per-container parallelism cap. Empty default means each runner
  # uses its own nproc-based default (correct for solo runs). The
  # matrix `make test` target sets these to a smaller value to
  # reduce CPU oversubscription when 17 containers run at once.
  CPP_COMPILE_JOBS: ${CPP_COMPILE_JOBS-}
  DART_COMPILE_JOBS: ${DART_COMPILE_JOBS-}
  ERLANG_TEST_JOBS: ${ERLANG_TEST_JOBS-}
  GO_COMPILE_JOBS: ${GO_COMPILE_JOBS-}
  RUST_EXEC_JOBS: ${RUST_EXEC_JOBS-}
  SWIFT_COMPILE_JOBS: ${SWIFT_COMPILE_JOBS-}

services:
  python:
    build: { context: ., dockerfile: base/python/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/python:/output"]

  typescript:
    build: { context: ., dockerfile: base/typescript/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/typescript:/output"]

  javascript:
    build: { context: ., dockerfile: base/javascript/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/javascript:/output"]

  rust:
    build: { context: ., dockerfile: base/rust/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/rust:/output"]

  c:
    build: { context: ., dockerfile: base/c/Dockerfile }
    environment: *env
    # ccache_c volume persists ~/.ccache across container restarts so
    # warm runs reuse object-file cache (the c/cpp base images put a
    # ccache shim in /usr/local/bin/{gcc,g++} pointing at /ccache as
    # CCACHE_DIR — see docker/base/c/Dockerfile).
    volumes: [*framec, *tests, "../output/c:/output", "ccache_c:/ccache"]

  cpp:
    build: { context: ., dockerfile: base/cpp/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/cpp:/output", "ccache_cpp:/ccache"]

  csharp:
    build: { context: ., dockerfile: base/csharp/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/csharp:/output"]

  java:
    build: { context: ., dockerfile: base/java/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/java:/output"]

  go:
    build: { context: ., dockerfile: base/go/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/go:/output"]

  php:
    build: { context: ., dockerfile: base/php/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/php:/output"]

  kotlin:
    build: { context: ., dockerfile: base/kotlin/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/kotlin:/output"]

  swift:
    build: { context: ., dockerfile: base/swift/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/swift:/output"]

  ruby:
    build: { context: ., dockerfile: base/ruby/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/ruby:/output"]

  erlang:
    build: { context: ., dockerfile: base/erlang/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/erlang:/output"]

  lua:
    build: { context: ., dockerfile: base/lua/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/lua:/output"]

  dart:
    build: { context: ., dockerfile: base/dart/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/dart:/output"]

  gdscript:
    build: { context: ., dockerfile: base/gdscript/Dockerfile }
    environment: *env
    volumes: [*framec, *tests, "../output/gdscript:/output"]

# Named volumes for ccache. Persisted in the user's docker volume
# store so warm runs reuse object-file cache. `docker compose down -v`
# (or `docker volume rm`) wipes them when stale.
volumes:
  ccache_c:
  ccache_cpp:
