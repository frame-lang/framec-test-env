version: '3.8'

# Frame VS Code Extension Debugger Test Environment
# Segregated configuration following team namespace policy

services:
  # Main debugger test runner
  frame-debugger-test:
    build:
      context: ../../../  # Back to vscode_editor root
      dockerfile: test_env/extension/docker/debugger-test-base.dockerfile
      target: testing
    image: frame-debugger/test-base:latest
    container_name: frame-debugger-test-main
    hostname: frame-debugger-test
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: integration
    volumes:
      # Extension team-specific mounts (using /debugger namespace)
      - ../tests:/debugger/tests:ro
      - ../fixtures:/debugger/fixtures:ro
      - ../results:/debugger/results:rw
      
      # Common resources (read-only)
      - ../../common/builds:/debugger/builds:ro
      - ../../common/test-frames:/debugger/test-frames:ro
      - ../../common/schemas:/debugger/schemas:ro
      
      # Extension source code
      - ../../../src:/debugger/src:ro
      - ../../../scripts:/debugger/scripts:ro
      
      # Cache volumes with debugger namespace
      - frame-debugger-node-modules:/debugger/node_modules
      - frame-debugger-vscode-test:/debugger/.vscode-test
      
      # NOT mounting framepiler/ - complete isolation
    environment:
      - NODE_ENV=test
      - CI=true
      - FRAME_TEST_NAMESPACE=debugger
      - FRAME_TEST_COMPONENT=vscode-extension
      - FRAME_DEBUG_PORT=9501  # In debugger range 9500-9999
      - TEST_TIMEOUT=120000
      - TEST_RUN_ID=debugger-${TIMESTAMP:-$(date +%Y%m%d-%H%M%S)}-$$
    networks:
      - frame-debugger-test-net
    ports:
      - "9501:9501"  # Debug port in our range
      - "9510:9229"  # Node.js debugger
      - "9511:5678"  # Python debugger
    command: npm test
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Unit test runner
  frame-debugger-unit-test:
    extends: frame-debugger-test
    container_name: frame-debugger-unit-test
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: unit
    command: npm run test:unit
    profiles:
      - unit

  # Integration test runner
  frame-debugger-integration-test:
    extends: frame-debugger-test
    container_name: frame-debugger-integration-test
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: integration
    command: npm run test:integration
    profiles:
      - integration

  # Smoke test runner
  frame-debugger-smoke-test:
    extends: frame-debugger-test
    container_name: frame-debugger-smoke-test
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: smoke
    command: bash -c "cd /debugger && npm run compile && bash scripts/run_runtime_smoke_entry.sh"
    profiles:
      - smoke

  # Debug mode container (stays running)
  frame-debugger-test-debug:
    extends: frame-debugger-test
    container_name: frame-debugger-test-debug
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: debug
    environment:
      - NODE_ENV=development
      - DEBUG=true
      - FRAME_TEST_NAMESPACE=debugger
    command: bash -c "npm run compile && tail -f /dev/null"
    profiles:
      - debug

  # Watch mode for development
  frame-debugger-test-watch:
    extends: frame-debugger-test
    container_name: frame-debugger-test-watch
    labels:
      frame.component: debugger
      frame.team: extension
      frame.test.type: watch
    volumes:
      # Additional writable mount for watch mode
      - ../../../src:/debugger/src:rw
      - ../../../out:/debugger/out:rw
    command: npm run watch
    profiles:
      - watch

networks:
  frame-debugger-test-net:
    driver: bridge
    name: frame-debugger-test-net-main
    labels:
      frame.component: debugger
      frame.team: extension
    ipam:
      config:
        - subnet: 172.29.0.0/24  # Our assigned subnet
          gateway: 172.29.0.1

volumes:
  # All volumes prefixed with frame-debugger-
  frame-debugger-node-modules:
    driver: local
    name: frame-debugger-node-modules
    labels:
      frame.component: debugger
      frame.team: extension
      frame.volume.type: cache
      
  frame-debugger-vscode-test:
    driver: local
    name: frame-debugger-vscode-test
    labels:
      frame.component: debugger
      frame.team: extension
      frame.volume.type: cache